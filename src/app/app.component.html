<div
  class="min-h-screen flex flex-col items-center justify-center bg-white dark:bg-gray-900 transition duration-500"
>
  <button
    (click)="toggleTheme()"
    class="absolute top-4 right-4 bg-gray-200 dark:bg-gray-800 text-gray-800 dark:text-gray-200 p-2 rounded theme-switcher transition duration-500"
  >
    <fa-icon [icon]="isDarkMode ? faSun : faMoon"></fa-icon>
  </button>
  <div class="text-center">
    <img
      src="assets/my-photo.jpeg"
      alt="Foto de Itallo Ramon"
      class="w-52 h-52 rounded-full mx-auto mb-4"
    />
    <h1
      class="text-6xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-green-500"
    >
      Itallo Ramon
    </h1>
    <p class="text-2xl text-gray-600 dark:text-gray-400">FullStack Developer</p>
    <div class="mt-8 space-y-4">
      <a
        href="https://github.com/italloramon"
        target="_blank"
        class="link-button block border-2 border-blue-500 text-blue-500 py-4 px-8 rounded text-lg hover:bg-blue-500 hover:text-white transition"
      >
        GitHub
      </a>
      <a
        href="https://linkedin.com/in/itallo-ramon"
        target="_blank"
        class="link-button block border-2 border-blue-700 text-blue-700 py-4 px-8 rounded text-lg hover:bg-blue-700 hover:text-white transition"
      >
        LinkedIn
      </a>
      <a
        href="mailto:irvp@ic.ufal.br"
        target="_blank"
        class="link-button block border-2 border-green-500 text-green-500 py-4 px-8 rounded text-lg hover:bg-green-500 hover:text-white transition"
      >
        Contact
      </a>
    </div>
  </div>
</div>
